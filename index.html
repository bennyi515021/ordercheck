<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>簡易驗收系統</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/noto-sans-tc@5.0.16/400,500,600,700.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#2563EB', 'primary-hover': '#1D4ED8' },
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        .product-scroll::-webkit-scrollbar { width: 6px; }
        .product-scroll::-webkit-scrollbar-track { background: transparent; }
        .product-scroll::-webkit-scrollbar-thumb { background-color: #CBD5E1; border-radius: 20px; }
        .modal-backdrop { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); }
        .fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        input, select, textarea { touch-action: auto; -webkit-user-select: text; }
        .status-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 9999px; font-size: 12px; font-weight: 500; }
        .status-pending { background: #FEF3C7; color: #92400E; }
        .status-partial { background: #DBEAFE; color: #1E40AF; }
        .status-completed { background: #D1FAE5; color: #065F46; }
        .status-defect { background: #FEE2E2; color: #991B1B; }
        .checkbox-custom { width: 22px; height: 22px; cursor: pointer; accent-color: #2563EB; }
        .row-checked { background-color: #F0FDF4; }
        .row-defect { background-color: #FEF2F2; }
        .diff-negative { color: #DC2626; font-weight: 700; }
        .diff-zero { color: #6B7280; }
        .defect-btn {
            width: 28px; height: 28px;
            display: inline-flex; align-items: center; justify-content: center;
            border-radius: 6px; font-weight: 600; font-size: 16px;
            transition: all 0.15s ease;
            user-select: none;
        }
        .defect-btn:active { transform: scale(0.9); }
        .defect-btn-minus { background: #FEE2E2; color: #DC2626; }
        .defect-btn-minus:hover:not(:disabled) { background: #FECACA; }
        .defect-btn-minus:disabled { opacity: 0.4; cursor: not-allowed; }
        .defect-btn-plus { background: #DBEAFE; color: #2563EB; }
        .defect-btn-plus:hover:not(:disabled) { background: #BFDBFE; }
        .defect-btn-plus:disabled { opacity: 0.4; cursor: not-allowed; }
        .defect-value {
            min-width: 32px;
            text-align: center;
            font-weight: 700;
            font-size: 15px;
        }
    </style>
</head>
<body class="bg-white text-slate-800 min-h-screen">

    <header class="px-6 py-6 border-b border-slate-200 max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-900">簡易驗收系統</h1>
                <p class="text-slate-500 text-sm mt-1 flex items-center gap-2">
                    <span class="inline-block w-2 h-2 rounded-full bg-green-500"></span>
                    勾選確認實收，異常時記錄缺失
                </p>
            </div>
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-2 px-4 py-2 bg-slate-100 rounded-lg text-sm">
                    <span class="text-slate-500">待驗收</span>
                    <span id="stat-pending" class="font-bold text-amber-600">0</span>
                    <span class="text-slate-300 mx-1">|</span>
                    <span class="text-slate-500">已完成</span>
                    <span id="stat-completed" class="font-bold text-green-600">0</span>
                    <span class="text-slate-300 mx-1">|</span>
                    <span class="text-slate-500">有缺失</span>
                    <span id="stat-defect" class="font-bold text-red-600">0</span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6 lg:py-10">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
            
            <!-- Left: Order List -->
            <div class="lg:col-span-1 space-y-4">
                <div class="flex items-center justify-between">
                    <h2 class="text-lg font-bold text-slate-900">訂單列表</h2>
                    <button id="btn-import-excel" class="flex items-center gap-2 px-3 py-1.5 bg-green-600 text-white rounded-lg text-sm font-medium hover:bg-green-700 transition shadow-sm">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                        匯入 Excel
                    </button>
                </div>

                <div class="flex gap-2">
                    <button class="filter-btn active flex-1 px-3 py-1.5 rounded-lg text-sm font-medium transition" data-filter="all">全部</button>
                    <button class="filter-btn flex-1 px-3 py-1.5 rounded-lg text-sm font-medium transition" data-filter="pending">待驗收</button>
                    <button class="filter-btn flex-1 px-3 py-1.5 rounded-lg text-sm font-medium transition" data-filter="completed">已完成</button>
                    <button class="filter-btn flex-1 px-3 py-1.5 rounded-lg text-sm font-medium transition" data-filter="defect">有缺失</button>
                </div>

                <div class="relative">
                    <input type="text" id="order-search" placeholder="搜尋訂單編號..." class="w-full pl-10 pr-4 py-2.5 bg-white border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-100 focus:border-blue-400 transition shadow-sm">
                    <svg class="w-4 h-4 text-slate-400 absolute left-3.5 top-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>

                <div id="order-list" class="space-y-3 max-h-[600px] overflow-y-auto product-scroll pr-1">
                    <div class="text-center py-10 text-slate-400 text-sm">
                        <svg class="w-12 h-12 mx-auto mb-3 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                        尚無訂單，請先匯入 Excel
                    </div>
                </div>
            </div>

            <!-- Right: Inspection Detail -->
            <div class="lg:col-span-2 lg:sticky lg:top-6">
                <div id="inspection-panel" class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
                    <!-- Empty State -->
                    <div id="empty-state" class="p-12 text-center">
                        <svg class="w-16 h-16 mx-auto mb-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <h3 class="text-lg font-semibold text-slate-700 mb-2">選擇訂單開始驗收</h3>
                        <p class="text-slate-500 text-sm mb-6">從左側選擇一個訂單，或點擊「匯入 Excel」載入新訂單</p>
                        <label class="inline-flex items-center gap-2 px-6 py-2.5 bg-green-600 hover:bg-green-700 text-white rounded-xl font-medium transition shadow-md cursor-pointer">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                            匯入 Excel
                            <input type="file" id="import-file-empty" class="hidden" accept=".xlsx,.xls,.csv">
                        </label>
                    </div>

                    <!-- Inspection Content -->
                    <div id="inspection-content" class="hidden">
                        <!-- Header -->
                        <div class="p-6 border-b border-slate-200 bg-slate-50">
                            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4">
                                <div>
                                    <div class="flex items-center gap-3 mb-1">
                                        <h2 class="text-xl font-bold text-slate-900" id="insp-order-id">ORD-XXX</h2>
                                        <span id="insp-status-badge" class="status-badge status-pending">待驗收</span>
                                    </div>
                                    <p class="text-sm text-slate-500" id="insp-order-date">2026/06/17 14:30</p>
                                </div>
                                <div class="flex gap-2">
                                    <button id="btn-import-excel-detail" class="flex items-center gap-2 px-3 py-1.5 bg-green-600 text-white rounded-lg text-sm font-medium hover:bg-green-700 transition shadow-sm">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                                        重新匯入
                                    </button>
                                    <button id="btn-export-insp" class="flex items-center gap-2 px-3 py-1.5 bg-white border border-slate-200 rounded-lg text-sm text-slate-600 hover:bg-slate-50 transition">
                                        <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                                        匯出報告
                                    </button>
                                    <button id="btn-delete-insp" class="flex items-center gap-2 px-3 py-1.5 bg-white border border-red-200 rounded-lg text-sm text-red-600 hover:bg-red-50 transition">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                        刪除
                                    </button>
                                </div>
                            </div>

                            <!-- Summary Cards -->
                            <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
                                <div class="bg-white p-3 rounded-xl border border-slate-200">
                                    <div class="text-xs text-slate-500 mb-1">訂購項目</div>
                                    <div class="text-xl font-bold text-slate-800" id="sum-items">0</div>
                                </div>
                                <div class="bg-white p-3 rounded-xl border border-slate-200">
                                    <div class="text-xs text-slate-500 mb-1">訂購總數</div>
                                    <div class="text-xl font-bold text-blue-600" id="sum-ordered">0</div>
                                </div>
                                <div class="bg-white p-3 rounded-xl border border-slate-200">
                                    <div class="text-xs text-slate-500 mb-1">已勾選</div>
                                    <div class="text-xl font-bold text-green-600" id="sum-checked">0</div>
                                </div>
                                <div class="bg-white p-3 rounded-xl border border-red-200 bg-red-50/50">
                                    <div class="text-xs text-red-600 mb-1">缺失總數</div>
                                    <div class="text-xl font-bold text-red-600" id="sum-defect">0</div>
                                </div>
                                <div class="bg-white p-3 rounded-xl border border-slate-200">
                                    <div class="text-xs text-slate-500 mb-1">缺失項目</div>
                                    <div class="text-xl font-bold text-orange-600" id="sum-defect-items">0</div>
                                </div>
                            </div>
                        </div>

                        <!-- Inspector Info -->
                        <div class="p-4 border-b border-slate-200 bg-white grid grid-cols-1 md:grid-cols-3 gap-3">
                            <div>
                                <label class="block text-xs font-medium text-slate-600 mb-1">驗收人</label>
                                <input type="text" id="insp-inspector" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-100" placeholder="輸入驗收人姓名">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-600 mb-1">驗收日期</label>
                                <input type="date" id="insp-date" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-100">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-600 mb-1">整體備註</label>
                                <input type="text" id="insp-note" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-100" placeholder="整體備註">
                            </div>
                        </div>

                        <!-- Legend -->
                        <div class="px-4 pt-3 flex flex-wrap gap-4 text-xs text-slate-600">
                            <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded bg-green-50 border border-green-200"></span> 勾選 = 已全數收到</div>
                            <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded bg-red-50 border border-red-200"></span> 未勾選 = 有缺失（可用 + / - 調整）</div>
                        </div>

                        <!-- Items Table -->
                        <div class="overflow-x-auto">
                            <table class="w-full text-sm">
                                <thead class="bg-slate-50 border-b border-slate-200">
                                    <tr>
                                        <th class="px-3 py-3 text-center font-medium text-slate-600 w-14">勾選</th>
                                        <th class="px-3 py-3 text-left font-medium text-slate-600">貨號</th>
                                        <th class="px-3 py-3 text-left font-medium text-slate-600">商品名稱</th>
                                        <th class="px-3 py-3 text-center font-medium text-slate-600 w-16">訂購數</th>
                                        <th class="px-3 py-3 text-center font-medium text-slate-600 w-16">實收數</th>
                                        <th class="px-3 py-3 text-center font-medium text-red-600 w-28">缺失數</th>
                                        <th class="px-3 py-3 text-center font-medium text-slate-600 w-16">狀態</th>
                                        <th class="px-3 py-3 text-left font-medium text-slate-600">缺失原因</th>
                                    </tr>
                                </thead>
                                <tbody id="insp-items-body" class="divide-y divide-slate-100"></tbody>
                            </table>
                        </div>

                        <!-- Footer Actions -->
                        <div class="p-4 bg-slate-50 border-t border-slate-200 flex flex-col md:flex-row justify-between items-center gap-3">
                            <div class="text-sm text-slate-600">
                                <span class="font-medium">驗收進度：</span>
                                <span id="progress-text" class="font-bold text-blue-600">0 / 0</span>
                                <span class="text-slate-400 mx-2">|</span>
                                <span id="progress-percent" class="font-bold text-slate-700">0%</span>
                            </div>
                            <div class="flex gap-2 w-full md:w-auto">
                                <button id="btn-check-all" class="flex-1 md:flex-none px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm text-slate-600 hover:bg-slate-100 transition">
                                    全部勾選
                                </button>
                                <button id="btn-uncheck-all" class="flex-1 md:flex-none px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm text-slate-600 hover:bg-slate-100 transition">
                                    全部取消
                                </button>
                                <button id="btn-save-insp" class="flex-1 md:flex-none px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition shadow-sm">
                                    保存驗收記錄
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Hidden File Input -->
    <input type="file" id="import-file" class="hidden" accept=".xlsx,.xls,.csv">

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 right-6 bg-slate-800 text-white px-6 py-3 rounded-lg shadow-lg text-sm font-medium opacity-0 transition-opacity duration-300 pointer-events-none z-[70]">操作成功</div>

    <script>
        // --- State ---
        let orders = JSON.parse(localStorage.getItem('orderHistory') || '[]');
        let inspections = JSON.parse(localStorage.getItem('inspectionRecords') || '[]');
        let currentFilter = 'all';
        let searchQuery = '';
        let currentInspId = null;

        // --- DOM Elements ---
        const els = {
            orderList: document.getElementById('order-list'),
            emptyState: document.getElementById('empty-state'),
            inspectionContent: document.getElementById('inspection-content'),
            inspOrderId: document.getElementById('insp-order-id'),
            inspOrderDate: document.getElementById('insp-order-date'),
            inspItemsBody: document.getElementById('insp-items-body'),
            inspInspector: document.getElementById('insp-inspector'),
            inspDate: document.getElementById('insp-date'),
            inspNote: document.getElementById('insp-note'),
            sumItems: document.getElementById('sum-items'),
            sumOrdered: document.getElementById('sum-ordered'),
            sumChecked: document.getElementById('sum-checked'),
            sumDefect: document.getElementById('sum-defect'),
            sumDefectItems: document.getElementById('sum-defect-items'),
            progressText: document.getElementById('progress-text'),
            progressPercent: document.getElementById('progress-percent'),
            statPending: document.getElementById('stat-pending'),
            statCompleted: document.getElementById('stat-completed'),
            statDefect: document.getElementById('stat-defect'),
            orderSearch: document.getElementById('order-search'),
            importFile: document.getElementById('import-file'),
            importFileEmpty: document.getElementById('import-file-empty'),
            toast: document.getElementById('toast')
        };

        // --- Core Functions ---
        function showToast(msg) {
            els.toast.textContent = msg;
            els.toast.classList.remove('opacity-0');
            setTimeout(() => els.toast.classList.add('opacity-0'), 2500);
        }

        function getStatusBadge(status) {
            const map = {
                'pending': { cls: 'status-pending', label: '待驗收' },
                'partial': { cls: 'status-partial', label: '部分驗收' },
                'completed': { cls: 'status-completed', label: '已完成' },
                'defect': { cls: 'status-defect', label: '有缺失' }
            };
            const s = map[status] || map['pending'];
            return `<span class="status-badge ${s.cls}">${s.label}</span>`;
        }

        function calcInspStatus(items) {
            const total = items.length;
            const checkedAll = items.filter(i => i.checked).length;
            const hasDefect = items.some(i => !i.checked);
            
            if (checkedAll === 0) return 'pending';
            if (checkedAll === total && !hasDefect) return 'completed';
            if (hasDefect) return 'defect';
            return 'partial';
        }

        function formatDateTime(iso) {
            if (!iso) return '-';
            const d = new Date(iso);
            return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        }

        // --- Update Defect Quantity ---
        function updateDefectQty(idx, delta) {
            const insp = inspections.find(i => i.id === currentInspId);
            if (!insp) return;
            
            const item = insp.items[idx];
            const newDefectQty = Math.max(0, Math.min(item.orderQty, (item.defectQty || 0) + delta));
            
            // If defect qty changes, automatically uncheck
            if (newDefectQty > 0) {
                item.checked = false;
            } else if (newDefectQty === 0 && item.defectQty !== 0) {
                // Only auto-check if defect becomes 0 AND was previously non-zero
                item.checked = true;
            }
            
            item.defectQty = newDefectQty;
            item.receivedQty = item.orderQty - newDefectQty;
            
            renderInspection(insp);
        }

        // --- Excel Import ---
        function handleExcelImport(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(firstSheet);

                    if (jsonData.length === 0) throw new Error('檔案為空');

                    const orderMap = new Map();
                    jsonData.forEach(row => {
                        const orderId = row['訂單編號'] || row['order_id'] || row['Order_ID'] || 'UNKNOWN';
                        if (!orderMap.has(orderId)) {
                            orderMap.set(orderId, []);
                        }
                        orderMap.get(orderId).push({
                            code: row['貨號'] || row['code'] || row['Code'] || '',
                            name: row['商品名稱'] || row['name'] || row['Name'] || '未命名',
                            orderQty: parseInt(row['訂購數量'] || row['order_qty'] || row['Order_Qty'] || row['數量'] || 0)
                        });
                    });

                    orderMap.forEach((items, orderId) => {
                        let order = orders.find(o => o.id === orderId);
                        if (!order) {
                            order = {
                                id: orderId,
                                date: new Date().toISOString(),
                                items: items.map(item => ({
                                    id: 'prod-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9),
                                    code: item.code,
                                    name: item.name,
                                    qty: item.orderQty
                                }))
                            };
                            orders.push(order);
                        }

                        let insp = inspections.find(i => i.orderId === orderId);
                        if (!insp) {
                            insp = {
                                id: 'INSP-' + Date.now().toString(36).toUpperCase(),
                                orderId: orderId,
                                createdAt: new Date().toISOString(),
                                inspector: '',
                                inspectionDate: new Date().toISOString().slice(0, 10),
                                note: '',
                                status: 'pending',
                                items: items.map(item => ({
                                    productId: 'prod-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9),
                                    code: item.code,
                                    name: item.name,
                                    orderQty: item.orderQty,
                                    checked: false,
                                    receivedQty: 0,
                                    defectQty: item.orderQty,
                                    defectReason: ''
                                }))
                            };
                            inspections.push(insp);
                        }
                    });

                    saveData();
                    renderOrderList();
                    showToast(`成功匯入 ${orderMap.size} 個訂單`);

                    const firstOrderId = Array.from(orderMap.keys())[0];
                    openInspection(firstOrderId);

                } catch (error) {
                    console.error(error);
                    showToast('匯入失敗：' + error.message);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // --- Render Order List ---
        function renderOrderList() {
            const orderMap = new Map();
            orders.forEach(o => orderMap.set(o.id, { ...o, inspectionStatus: null, hasDefect: false }));
            inspections.forEach(insp => {
                if (orderMap.has(insp.orderId)) {
                    orderMap.get(insp.orderId).inspectionStatus = insp.status;
                    orderMap.get(insp.orderId).inspectionId = insp.id;
                    orderMap.get(insp.orderId).hasDefect = insp.items.some(i => !i.checked);
                }
            });

            let list = Array.from(orderMap.values());

            if (currentFilter === 'pending') {
                list = list.filter(o => !o.inspectionStatus || o.inspectionStatus === 'pending');
            } else if (currentFilter === 'completed') {
                list = list.filter(o => o.inspectionStatus === 'completed');
            } else if (currentFilter === 'defect') {
                list = list.filter(o => o.hasDefect);
            }

            if (searchQuery) {
                list = list.filter(o => o.id.toLowerCase().includes(searchQuery.toLowerCase()));
            }

            list.sort((a, b) => new Date(b.date) - new Date(a.date));

            const pendingCount = orders.filter(o => {
                const insp = inspections.find(i => i.orderId === o.id);
                return !insp || insp.status === 'pending';
            }).length;
            const completedCount = orders.filter(o => {
                const insp = inspections.find(i => i.orderId === o.id);
                return insp && insp.status === 'completed';
            }).length;
            const defectCount = orders.filter(o => {
                const insp = inspections.find(i => i.orderId === o.id);
                return insp && insp.items.some(i => !i.checked);
            }).length;
            els.statPending.textContent = pendingCount;
            els.statCompleted.textContent = completedCount;
            els.statDefect.textContent = defectCount;

            if (list.length === 0) {
                els.orderList.innerHTML = `
                    <div class="text-center py-10 text-slate-400 text-sm">
                        <svg class="w-12 h-12 mx-auto mb-3 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                        無符合的訂單
                    </div>`;
                return;
            }

            els.orderList.innerHTML = list.map(o => {
                const totalQty = o.items.reduce((s, i) => s + i.qty, 0);
                const hasInsp = o.inspectionStatus;
                const isSelected = currentInspId === o.inspectionId;
                const hasDefect = o.hasDefect;
                return `
                    <div class="order-card p-4 bg-white border ${isSelected ? 'border-blue-400 bg-blue-50/30' : 'border-slate-200'} rounded-xl hover:border-blue-300 transition cursor-pointer" data-order-id="${o.id}">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <div class="font-semibold text-slate-800 text-sm flex items-center gap-2">
                                    ${o.id}
                                    ${hasDefect ? '<span class="status-badge status-defect">有缺失</span>' : ''}
                                </div>
                                <div class="text-xs text-slate-400 mt-0.5">${formatDateTime(o.date)}</div>
                            </div>
                            ${hasInsp ? getStatusBadge(hasInsp) : '<span class="status-badge status-pending">待驗收</span>'}
                        </div>
                        <div class="flex items-center justify-between text-xs text-slate-500 mt-2 pt-2 border-t border-slate-100">
                            <span>${o.items.length} 項商品</span>
                            <span class="font-medium text-slate-700">共 ${totalQty} 件</span>
                        </div>
                    </div>
                `;
            }).join('');

            els.orderList.querySelectorAll('.order-card').forEach(card => {
                card.addEventListener('click', () => {
                    const orderId = card.dataset.orderId;
                    openInspection(orderId);
                });
            });
        }

        // --- Open Inspection ---
        function openInspection(orderId) {
            const order = orders.find(o => o.id === orderId);
            if (!order) return;

            let insp = inspections.find(i => i.orderId === orderId);
            if (!insp) {
                insp = {
                    id: 'INSP-' + Date.now().toString(36).toUpperCase(),
                    orderId: orderId,
                    createdAt: new Date().toISOString(),
                    inspector: '',
                    inspectionDate: new Date().toISOString().slice(0, 10),
                    note: '',
                    status: 'pending',
                    items: order.items.map(item => ({
                        productId: item.id,
                        code: item.code,
                        name: item.name,
                        orderQty: item.qty,
                        checked: false,
                        receivedQty: 0,
                        defectQty: item.qty,
                        defectReason: ''
                    }))
                };
                inspections.push(insp);
                saveData();
            }

            currentInspId = insp.id;
            renderInspection(insp);
            renderOrderList();
        }

        function renderInspection(insp) {
            const order = orders.find(o => o.id === insp.orderId);
            
            els.emptyState.classList.add('hidden');
            els.inspectionContent.classList.remove('hidden');

            els.inspOrderId.textContent = insp.orderId;
            els.inspOrderDate.textContent = `建立於 ${formatDateTime(order.date)}`;
            
            els.inspInspector.value = insp.inspector || '';
            els.inspDate.value = insp.inspectionDate || new Date().toISOString().slice(0, 10);
            els.inspNote.value = insp.note || '';

            els.inspItemsBody.innerHTML = insp.items.map((item, idx) => {
                const rowClass = item.checked ? 'row-checked' : 'row-defect';
                const receivedQty = item.checked ? item.orderQty : (item.receivedQty || 0);
                const defectQty = item.checked ? 0 : (item.defectQty || 0);
                const statusLabel = item.checked ? '已收' : '缺失';
                const statusColor = item.checked ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700';
                
                return `
                    <tr class="${rowClass} hover:bg-slate-50 transition">
                        <td class="px-3 py-3 text-center">
                            <input type="checkbox" class="checkbox-custom" ${item.checked ? 'checked' : ''} data-idx="${idx}">
                        </td>
                        <td class="px-3 py-3 font-mono text-xs text-slate-600">${item.code}</td>
                        <td class="px-3 py-3 text-slate-800 font-medium">${item.name}</td>
                        <td class="px-3 py-3 text-center text-slate-600 font-medium">${item.orderQty}</td>
                        <td class="px-3 py-3 text-center font-bold ${item.checked ? 'text-green-600' : 'text-slate-400'}">${receivedQty}</td>
                        <td class="px-3 py-3">
                            <div class="flex items-center justify-center gap-1.5">
                                <button class="defect-btn defect-btn-minus" data-idx="${idx}" data-delta="-1" ${defectQty <= 0 ? 'disabled' : ''}>−</button>
                                <span class="defect-value ${defectQty > 0 ? 'diff-negative' : 'diff-zero'}">${defectQty}</span>
                                <button class="defect-btn defect-btn-plus" data-idx="${idx}" data-delta="1" ${defectQty >= item.orderQty ? 'disabled' : ''}>+</button>
                            </div>
                        </td>
                        <td class="px-3 py-3 text-center">
                            <span class="inline-block px-2 py-0.5 rounded text-xs font-medium ${statusColor}">${statusLabel}</span>
                        </td>
                        <td class="px-3 py-3">
                            ${item.checked ? '<span class="text-slate-400 text-xs">-</span>' : `
                                <input type="text" value="${item.defectReason || ''}" placeholder="請填寫缺失原因" 
                                    class="w-full px-2 py-1 border border-red-200 bg-red-50/30 rounded text-sm focus:outline-none focus:ring-2 focus:ring-red-100"
                                    data-idx="${idx}" data-field="defectReason">
                            `}
                        </td>
                    </tr>
                `;
            }).join('');

            // Bind checkbox events
            els.inspItemsBody.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
                checkbox.addEventListener('change', (e) => {
                    const idx = parseInt(e.target.dataset.idx);
                    insp.items[idx].checked = e.target.checked;
                    if (e.target.checked) {
                        insp.items[idx].receivedQty = insp.items[idx].orderQty;
                        insp.items[idx].defectQty = 0;
                        insp.items[idx].defectReason = '';
                    } else {
                        insp.items[idx].receivedQty = 0;
                        insp.items[idx].defectQty = insp.items[idx].orderQty;
                    }
                    renderInspection(insp);
                });
            });

            // Bind defect +/- buttons
            els.inspItemsBody.querySelectorAll('.defect-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const idx = parseInt(btn.dataset.idx);
                    const delta = parseInt(btn.dataset.delta);
                    updateDefectQty(idx, delta);
                });
            });

            // Bind defect reason inputs
            els.inspItemsBody.querySelectorAll('input[data-field="defectReason"]').forEach(input => {
                input.addEventListener('input', (e) => {
                    const idx = parseInt(e.target.dataset.idx);
                    insp.items[idx].defectReason = e.target.value;
                });
            });

            // Inspector info listeners
            els.inspInspector.addEventListener('input', (e) => { insp.inspector = e.target.value; });
            els.inspDate.addEventListener('input', (e) => { insp.inspectionDate = e.target.value; });
            els.inspNote.addEventListener('input', (e) => { insp.note = e.target.value; });

            updateSummary();
        }

        function updateSummary() {
            const insp = inspections.find(i => i.id === currentInspId);
            if (!insp) return;

            const totalOrdered = insp.items.reduce((s, i) => s + i.orderQty, 0);
            const totalChecked = insp.items.filter(i => i.checked).reduce((s, i) => s + i.orderQty, 0);
            const totalDefect = totalOrdered - totalChecked;
            const defectItems = insp.items.filter(i => !i.checked).length;
            
            els.sumItems.textContent = insp.items.length;
            els.sumOrdered.textContent = totalOrdered;
            els.sumChecked.textContent = totalChecked;
            els.sumDefect.textContent = totalDefect;
            els.sumDefectItems.textContent = defectItems;

            const done = insp.items.filter(i => i.checked).length;
            const total = insp.items.length;
            const pct = total > 0 ? Math.round((done / total) * 100) : 0;
            els.progressText.textContent = `${done} / ${total}`;
            els.progressPercent.textContent = `${pct}%`;

            insp.status = calcInspStatus(insp.items);
            const badgeEl = document.getElementById('insp-status-badge');
            if (badgeEl) {
                const map = {
                    'pending': { cls: 'status-pending', label: '待驗收' },
                    'partial': { cls: 'status-partial', label: '部分驗收' },
                    'completed': { cls: 'status-completed', label: '已完成' },
                    'defect': { cls: 'status-defect', label: '有缺失' }
                };
                const s = map[insp.status];
                badgeEl.className = `status-badge ${s.cls}`;
                badgeEl.textContent = s.label;
            }
        }

        function saveData() {
            localStorage.setItem('orderHistory', JSON.stringify(orders));
            localStorage.setItem('inspectionRecords', JSON.stringify(inspections));
        }

        // --- Export Inspection Report ---
        function exportInspectionReport() {
            const insp = inspections.find(i => i.id === currentInspId);
            if (!insp) return;

            const order = orders.find(o => o.id === insp.orderId);
            
            const data = [
                ['驗收報告'],
                [],
                ['訂單編號', insp.orderId],
                ['訂單日期', formatDateTime(order.date)],
                ['驗收人', insp.inspector || '-'],
                ['驗收日期', insp.inspectionDate || '-'],
                ['備註', insp.note || '-'],
                [],
                ['狀態', '貨號', '商品名稱', '訂購數量', '實收數量', '缺失數量', '缺失原因']
            ];

            insp.items.forEach(item => {
                const status = item.checked ? '已收' : '缺失';
                const receivedQty = item.checked ? item.orderQty : (item.receivedQty || 0);
                const defectQty = item.checked ? 0 : (item.defectQty || item.orderQty);
                data.push([
                    status,
                    item.code,
                    item.name,
                    item.orderQty,
                    receivedQty,
                    defectQty,
                    item.checked ? '' : (item.defectReason || '')
                ]);
            });

            const totalOrdered = insp.items.reduce((s, i) => s + i.orderQty, 0);
            const totalChecked = insp.items.filter(i => i.checked).reduce((s, i) => s + i.orderQty, 0);
            const totalDefect = totalOrdered - totalChecked;
            data.push([]);
            data.push(['', '', '合計', totalOrdered, totalChecked, totalDefect, '']);

            const ws = XLSX.utils.aoa_to_sheet(data);
            ws['!cols'] = [
                { wch: 8 }, { wch: 12 }, { wch: 25 }, { wch: 10 }, { wch: 10 }, { wch: 10 }, { wch: 20 }
            ];
            ws['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 6 } }];

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, '驗收報告');
            XLSX.writeFile(wb, `驗收報告_${insp.orderId}_${insp.inspectionDate || 'draft'}.xlsx`);
            showToast('驗收報告已匯出');
        }

        // --- Event Listeners ---
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => {
                    b.classList.remove('active', 'bg-blue-600', 'text-white');
                    b.classList.add('bg-slate-100', 'text-slate-600');
                });
                btn.classList.add('active', 'bg-blue-600', 'text-white');
                btn.classList.remove('bg-slate-100', 'text-slate-600');
                currentFilter = btn.dataset.filter;
                renderOrderList();
            });
        });

        els.orderSearch.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderOrderList();
        });

        els.importFile.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleExcelImport(e.target.files[0]);
                e.target.value = '';
            }
        });

        els.importFileEmpty.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleExcelImport(e.target.files[0]);
                e.target.value = '';
            }
        });

        document.getElementById('btn-import-excel').addEventListener('click', () => els.importFile.click());
        document.getElementById('btn-import-excel-detail').addEventListener('click', () => els.importFile.click());

        document.getElementById('btn-check-all').addEventListener('click', () => {
            const insp = inspections.find(i => i.id === currentInspId);
            if (!insp) return;
            insp.items.forEach(item => { 
                item.checked = true; 
                item.receivedQty = item.orderQty;
                item.defectQty = 0;
                item.defectReason = '';
            });
            renderInspection(insp);
            showToast('已全部勾選');
        });

        document.getElementById('btn-uncheck-all').addEventListener('click', () => {
            const insp = inspections.find(i => i.id === currentInspId);
            if (!insp) return;
            insp.items.forEach(item => { 
                item.checked = false; 
                item.receivedQty = 0;
                item.defectQty = item.orderQty;
            });
            renderInspection(insp);
            showToast('已全部取消勾選');
        });

        document.getElementById('btn-save-insp').addEventListener('click', () => {
            saveData();
            renderOrderList();
            showToast('驗收記錄已保存');
        });

        document.getElementById('btn-export-insp').addEventListener('click', exportInspectionReport);

        document.getElementById('btn-delete-insp').addEventListener('click', () => {
            if (!currentInspId) return;
            if (!confirm('確定要刪除此驗收記錄嗎？')) return;
            inspections = inspections.filter(i => i.id !== currentInspId);
            saveData();
            currentInspId = null;
            els.emptyState.classList.remove('hidden');
            els.inspectionContent.classList.add('hidden');
            renderOrderList();
            showToast('驗收記錄已刪除');
        });

        // --- Init ---
        function init() {
            document.querySelectorAll('.filter-btn').forEach(b => {
                if (b.classList.contains('active')) {
                    b.classList.add('bg-blue-600', 'text-white');
                    b.classList.remove('bg-slate-100', 'text-slate-600');
                } else {
                    b.classList.add('bg-slate-100', 'text-slate-600');
                }
            });
            renderOrderList();
        }
        init();
    </script>
</body>
</html>
